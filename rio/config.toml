theme = "iceberg-dark"

hide-mouse-cursor-when-typing = true

env-vars = ["TERM=xterm-256color"]

[fonts]
size = 25
hinting = false

[fonts.regular]
family = "JetBrainsMono Nerd Font"
style = "normal"
weight = 400

[fonts.bold]
family = "JetBrainsMono Nerd Font"
style = "normal"
weight = 700

[fonts.italic]
family = "JetBrainsMono Nerd Font"
style = "italic"
weight = 400

[fonts.bold-italic]
family = "JetBrainsMono Nerd Font"
style = "italic"
weight = 700

[navigation]
mode = "plain" 

[window]
padding-x = 10
padding-y = 10

[renderer]
backend = "Vulkan"
disable-renderer-when-unfocused = true

[cursor]
shape = "underline"
blinking = false

[editor]
program = "hx"
args = []
